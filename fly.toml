# fly.toml app configuration file generated for titibet on 2026-06-18T21:25:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'titibet'
primary_region = 'ams'

[build]

[env]
  CORS_ORIGINS = 'https://titibet.fly.dev'
  DB_URL = 'sqlite+aiosqlite:////data/titibet.db'
  PORT = '8000'
  SKIP_STARTUP_SYNC = 'false'

[[mounts]]
  source = 'titibet_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
