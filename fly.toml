# fly.toml app configuration file generated for titibets on 2026-06-22T09:54:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'titibets'
primary_region = 'jnb'

[build]

[env]
  API_CACHE_DIR = '/data/.cache/api_football'
  APP_URL = 'https://titibet.fly.dev'
  CORS_ORIGINS = 'https://titibet.fly.dev,https://titibet.app,https://www.titibet.app'
  DB_URL = 'sqlite+aiosqlite:////data/titibet.db'
  MAX_LEAGUE_ODDS_CALLS = '25'
  MAX_ODDS_PAGES = '3'
  PORT = '8000'
  SKIP_STARTUP_SYNC = 'false'
  SYNC_TIMES = '04:00,08:00,12:00,18:00,22:01'

[[mounts]]
  source = 'titibet_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '3m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
