# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for SisiBet — sisibet.com
#
# What this does:
#   1. Redirects all HTTP → HTTPS
#   2. Redirects www → non-www (canonical)
#   3. Serves the React frontend (dist/) as a SPA
#   4. Proxies /api/* and /health to the FastAPI backend on :8010
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/sisibet
#   sudo ln -s /etc/nginx/sites-available/sisibet /etc/nginx/sites-enabled/sisibet
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (run AFTER nginx is live on port 80):
#   sudo certbot --nginx -d sisibet.com -d www.sisibet.com
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sisibet.com www.sisibet.com;
    return 301 https://sisibet.com$request_uri;
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sisibet.com;

    # SSL certs filled in by Certbot — leave these placeholders
    ssl_certificate     /etc/letsencrypt/live/sisibet.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sisibet.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sisibet.com$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sisibet.com;

    ssl_certificate     /etc/letsencrypt/live/sisibet.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sisibet.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend static files — built by: npm run build
    root /var/www/sisibet/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to FastAPI backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health probe — also proxied to backend
    location /health {
        proxy_pass http://127.0.0.1:8010/health;
    }

    # SPA fallback — all other routes return index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
    add_header X-XSS-Protection       "1; mode=block" always;
}
