<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>TiTiBet — Value Betting Intelligence</title>
    <meta name="description" content="Value Betting Intelligence Platform — Signals, Tracker & Analytics" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Favicon + manifest -->
    <link rel="icon" type="image/png" href="/falcon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TiTiBet" />
    <link rel="apple-touch-icon" href="/falcon.png" />

    <!-- Open Graph (for link previews) -->
    <meta property="og:title" content="TiTiBet — Value Betting Intelligence" />
    <meta property="og:description" content="Value Betting Intelligence Platform — Signals, Tracker & Analytics" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.warn('SW registration failed:', err)
          })
        })
      }
    </script>
  </body>
</html>
